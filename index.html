<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LamSon News - Modern Client</title>
</head>
    <style>
        /* ==========================================================================
   RESET & BIẾN MÀU CƠ BẢN
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Poppins:wght@500;700&display=swap');

:root {
    --card-bg: rgba(255, 255, 255, 0.98);
    --text-main: #1e293b;
    --text-muted: #64748b;
    --neon-pink: #ff007f;
    --neon-blue: #00f0ff;
    --neon-purple: #8a2be2;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Tùy chỉnh thanh cuộn (Scrollbar) siêu màu mè */
::-webkit-scrollbar {
    width: 12px;
}
::-webkit-scrollbar-track {
    background: #111; 
}
::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--neon-pink), var(--neon-blue));
    border-radius: 10px;
    border: 3px solid #111;
}

/* ==========================================================================
   BODY & BACKGROUND ĐỘNG (ANIMATED MESH GRADIENT)
   ========================================================================== */
body {
    font-family: 'Nunito', sans-serif;
    color: var(--text-main);
    min-height: 100vh;
    padding: 40px 20px;
    background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a18cd1, #fbc2eb, #8fd3f4);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    overflow-x: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
}

/* ==========================================================================
   HEADER SANG TRỌNG
   ========================================================================== */
.page-header {
    text-align: center;
    margin-bottom: 60px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
    animation: dropDown 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

@keyframes dropDown {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.page-header h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 3.5rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #ffffff;
    text-shadow: 
        3px 3px 0px var(--neon-pink),
        -3px -3px 0px var(--neon-blue),
        0px 0px 20px rgba(255,255,255,0.8);
    margin-bottom: 10px;
}

.page-header p {
    font-size: 1.2rem;
    color: #fff;
    font-weight: 600;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
    letter-spacing: 1px;
}

/* ==========================================================================
   GRID & KHỐI CARD TIN TỨC (TRẮNG MUỐT NỔI LÊN)
   ========================================================================== */
.news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 30px;
    perspective: 1000px;
}

.news-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15), 
                inset 0 0 0 1px rgba(255, 255, 255, 1);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    transform-style: preserve-3d;
    z-index: 1;
}

.news-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 20px;
    padding: 3px;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue), var(--neon-purple));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
}

.news-card:hover {
    transform: translateY(-15px) scale(1.03) rotateX(5deg) rotateY(-5deg);
    box-shadow: 
        0 30px 40px rgba(0, 0, 0, 0.2),
        -15px 15px 30px rgba(255, 0, 127, 0.2),
        15px -15px 30px rgba(0, 240, 255, 0.2);
}

.news-card:hover::before {
    opacity: 1;
}

.news-card h3 {
    font-family: 'Poppins', sans-serif;
    font-size: 1.3rem;
    color: #111;
    margin-bottom: 15px;
    line-height: 1.4;
    text-transform: uppercase;
    background-image: linear-gradient(to right, var(--neon-pink), var(--neon-blue));
    background-size: 0% 3px;
    background-repeat: no-repeat;
    background-position: left bottom;
    transition: background-size 0.4s ease;
    padding-bottom: 5px;
}

.news-card:hover h3 {
    background-size: 100% 3px;
}

.news-card p {
    color: var(--text-muted);
    line-height: 1.7;
    font-size: 1rem;
    margin-bottom: 25px;
}

.read-more {
    display: inline-block;
    padding: 10px 25px;
    background: linear-gradient(45deg, #1e293b, #334155);
    color: #ffffff !important;
    text-decoration: none;
    border-radius: 50px;
    font-weight: bold;
    font-size: 0.9rem;
    text-align: center;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(30, 41, 59, 0.3);
    border: 1px solid transparent;
}

.read-more:hover {
    background: #ffffff;
    color: #1e293b !important;
    border-color: #1e293b;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 255, 255, 0.5);
}

/* ==========================================================================
   LOADING SPINNER (VÒNG XOAY HIỆN ĐẠI SIÊU MƯỢT)
   ========================================================================== */
.loading-spinner {
    width: 60px;
    height: 60px;
    border: 5px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: var(--neon-pink);
    border-bottom-color: var(--neon-blue);
    animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    margin: 60px auto;
    display: none;
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
}

@keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1); }
}

/* ==========================================================================
   THÔNG BÁO LỖI (ERROR MESSAGE)
   ========================================================================== */
.error-msg {
    background: rgba(255, 51, 51, 0.9);
    color: #fff;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
    font-size: 1.2rem;
    box-shadow: 0 10px 20px rgba(255, 51, 51, 0.4);
    animation: shake 0.5s ease-in-out;
    max-width: 500px;
    margin: 0 auto;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-10px); }
    40%, 80% { transform: translateX(10px); }
}
    </style>
<body>

    <div class="container">
        <header class="page-header">
            <h1>TIN TỨC</h1>
            <p>Luôn cập nhật những tin tức mới nhất tầng Client</p>
        </header>
        
        <div id="loading" class="loading-spinner"></div>
        
        <div id="news-container" class="news-grid"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
